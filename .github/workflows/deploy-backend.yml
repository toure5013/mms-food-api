name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Generate CapRover definition
        run: |
          echo '{ "schemaVersion": 2, "dockerfilePath": "./Dockerfile" }' > captain-definition

      - name: Package application
        run: |
          echo "node_modules" > .tarignore
          echo ".git" >> .tarignore
          echo "dist" >> .tarignore
          echo "*.log" >> .tarignore

          tar --exclude-from=.tarignore -cf deploy.tar .

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_MMS_BACKEND_APP_NAME }}
          token: ${{ secrets.CAPROVER_MMS_BACKEND_APP_TOKEN }}
